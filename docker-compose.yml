version: "3.9"

services:
  # ─── Base Images (build profile only) ────────────────────────────────────
  # 사용: `docker compose --profile build build` — 평소엔 안 띄움
  build-base:
    build:
      context: .
      dockerfile: infra/docker/build-base.Dockerfile
    image: erp-ot-build-base:latest
    profiles: ["build"]

  runtime-base:
    build:
      context: .
      dockerfile: infra/docker/runtime-base.Dockerfile
    image: erp-ot-runtime-base:latest
    profiles: ["build"]

  # ─── Databases ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: erp-ot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}
      POSTGRES_DB: ${POSTGRES_DB:-erp_ot}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-ot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required - generate with openssl rand -hex 16}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: erp-ot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-erp_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required - generate with openssl rand -hex 16}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - erp-network

  # ─── Backend Services ───────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: erp-ot-auth
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required - generate with openssl rand -hex 16}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required - min 32 chars - openssl rand -hex 32}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@erp-ot.local}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?ADMIN_INITIAL_PASSWORD required - min 12 chars}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}@rabbitmq:5672
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_TIMEOUT_MS: "30000"
      SEARCH_EMBED_WEIGHT: "0.6"
      SEARCH_KEYWORD_WEIGHT: "0.4"
      SEARCH_MIN_SCORE: "0.35"
      SEARCH_TITLE_EXACT_BONUS: "0.30"
      SEARCH_CONTENT_EXACT_BONUS: "0.15"
      SEARCH_TITLE_TRGM_WEIGHT: "0.20"
      SEARCH_CONTENT_TRGM_WEIGHT: "0.10"
      SEARCH_KEYWORD_MATCH_BONUS: "0.20"
      HIDE_LOAD_TEST: "${HIDE_LOAD_TEST:-true}"
      LOAD_TEST_DOMAIN: "${LOAD_TEST_DOMAIN:-@erp-ot.load}"
      # 회사달력 v1.2 — 한국 공휴일 자동 갱신 (KASI 특일 정보 API)
      # 미설정 허용 — sync 호출 시에만 명시적 에러
      KASI_API_KEY: "${KASI_API_KEY:-}"
      # 첨부 저장 (게시판/수리관리 점검 등 — LocalFsStorage)
      BOARD_ATTACHMENT_DIR: /app/uploads/board
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - auth_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - erp-network

  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: erp-ot-user
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required - generate with openssl rand -hex 16}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - erp-network

  project-service:
    build:
      context: .
      dockerfile: services/project/Dockerfile
    container_name: erp-ot-project
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required - generate with openssl rand -hex 16}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}@rabbitmq:5672
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_TIMEOUT_MS: "30000"
      SEARCH_EMBED_WEIGHT: "0.6"
      SEARCH_KEYWORD_WEIGHT: "0.4"
      SEARCH_MIN_SCORE: "0.35"
      SEARCH_CONTENT_EXACT_BONUS: "0.15"
      SEARCH_CONTENT_TRGM_WEIGHT: "0.10"
      SEARCH_KEYWORD_MATCH_BONUS: "0.20"
      HIDE_LOAD_TEST: "${HIDE_LOAD_TEST:-true}"
      LOAD_TEST_DOMAIN: "${LOAD_TEST_DOMAIN:-@erp-ot.load}"
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - auth-service
      - user-service
    networks:
      - erp-network
    volumes:
      - file_storage:/app/storage

  attendance-service:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile
    container_name: erp-ot-attendance
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD required - generate with openssl rand -hex 16}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      PROJECT_SERVICE_URL: http://project-service:3003
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - erp-network

  equipment-service:
    build:
      context: .
      dockerfile: services/equipment/Dockerfile
    container_name: erp-ot-equipment
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      AUTH_SERVICE_URL: http://auth-service:3001
      PROJECT_SERVICE_URL: http://project-service:3003
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      - postgres
      - auth-service
    networks:
      - erp-network

  approval-service:
    build:
      context: .
      dockerfile: services/approval/Dockerfile
    container_name: erp-ot-approval
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      AUTH_SERVICE_URL: http://auth-service:3001
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      ATTENDANCE_SERVICE_URL: http://attendance-service:3004
      EXPENSE_SERVICE_URL: http://expense-service:3008
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "127.0.0.1:3006:3006"
    volumes:
      - approval_uploads:/app/uploads
    depends_on:
      - postgres
      - auth-service
      - attendance-service
    networks:
      - erp-network

  # ─── OCR Service ──────────────────────────────────────────────────────────────
  ocr-engine:
    build:
      context: ./services/ocr/engine
      dockerfile: Dockerfile
    container_name: erp-ot-ocr-engine
    restart: unless-stopped
    environment:
      USE_GPU: "false"
      LANG: korean
      MODEL_DIR: /app/models
      # ANTHROPIC_API_KEY 제거 — Claude Vision은 ERP에서 미사용 (2026-05-11)
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL:-}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ocr_models:/app/models
    # 메모리 제한: PaddleOCR/EasyOCR 다국어 모델 lazy-load 누적 방지 (개발 PC 메모리 15GB 압박 완화)
    mem_limit: 4g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - erp-network

  # OCR 개발용 테스트 UI (정적 HTML) — localhost:9090
  ocr-test-ui:
    image: nginx:alpine
    container_name: erp-ot-ocr-test-ui
    restart: unless-stopped
    volumes:
      - ./services/ocr/test-ui:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:9090:80"
    networks:
      - erp-network

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr/Dockerfile
    container_name: erp-ot-ocr
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}?schema=ocr
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      OCR_ENGINE_URL: http://ocr-engine:8000
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      AUTH_SERVICE_URL: http://auth-service:3001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
    ports:
      - "127.0.0.1:3007:3007"
    volumes:
      - ocr_uploads:/app/uploads
    depends_on:
      ocr-engine:
        condition: service_healthy
      postgres:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - erp-network

  # ─── Expense Service (경비정산 — 2026-05-08 신규) ─────────────────────────────
  expense-service:
    build:
      context: .
      dockerfile: services/expense/Dockerfile
    container_name: erp-ot-expense
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3008
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required - generate with openssl rand -hex 16}@postgres:5432/${POSTGRES_DB:-erp_ot}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      AUTH_SERVICE_URL: http://auth-service:3001
      OCR_SERVICE_URL: http://ocr-service:3007
      APPROVAL_SERVICE_URL: http://approval-service:3006
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?INTERNAL_API_TOKEN required - min 16 chars - openssl rand -hex 16}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD required}@rabbitmq:5672
      EXPENSE_ATTACHMENT_DIR: /app/uploads
      EXPENSE_ATTACHMENT_MAX_SIZE: "10485760"
    ports:
      - "127.0.0.1:3008:3008"
    volumes:
      - expense_uploads:/app/uploads
    depends_on:
      - postgres
      - auth-service
      - rabbitmq
    networks:
      - erp-network

  # ─── 백업 ────────────────────────────────────────────────────────────────────
  # 로컬 db-backup 컨테이너 제거(2026-06-20): 홈 crontab `erp-nas-backup.sh`(daily erp_ot
  # DB+uploads→NAS, weekly otbrain→NAS)와 중복이라 NAS 백업으로 일원화. NAS가 오프사이트라
  # 디스크 장애와 분리. (이전 로컬 백업은 ./backups에 30일분 잔존 — 자연 정리)

  # ─── Frontend Apps ──────────────────────────────────────────────────────────
  # web은 dev 모드 유지 (이번 PDCA 1번 선택 — standalone은 후속 `web-standalone-fix` PDCA)
  # apps/web/Dockerfile은 standalone 패턴으로 작성되어 있으나 prerender 이슈로 미적용
  web:
    image: node:20-alpine
    container_name: erp-ot-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "rm -rf .next && npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: http://project-service:3003
      AUTH_SERVICE_URL: http://auth-service:3001
      ATTENDANCE_SERVICE_URL: http://attendance-service:3004
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      APPROVAL_SERVICE_URL: http://approval-service:3006
      OCR_SERVICE_URL: http://ocr-service:3007
      EXPENSE_SERVICE_URL: http://expense-service:3008
      # NAS 파일 서빙: 브라우저는 same-origin(/nas-file)로 호출 → web 이 ot-nas-file:3105 로 프록시
      NEXT_PUBLIC_NAS_FILE_BASE: /nas-file
      NAS_FILE_SERVICE_URL: http://ot-nas-file:3105
      JWT_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET required - min 32 chars - openssl rand -hex 32}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - project-service
      - auth-service
    networks:
      - erp-network

  # ─── Ollama (자연어 검색용 임베딩 모델) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: erp-ot-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    environment:
      # 2026-06-20: bge-m3 영구 상주(-1) — 콜드스타트 4.7s 제거(웜 0.5s 유지). RAM 1.16GB 상주
      #   (서버 RAM 24Gi 여유). 임베딩=사내 문서/자산 시맨틱 검색용(사진 아님). vram=0=CPU.
      OLLAMA_KEEP_ALIVE: "-1"
      # 검색 회귀 진단 2026-05-02: 60 VU 부하에서 직렬 처리 병목 (요청당 embed 2회 호출)
      # 2026-06-13: 주말 병렬 청킹 임베딩 처리량 위해 4→8 (24코어 CPU 포화 수준)
      OLLAMA_NUM_PARALLEL: "8"
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  file_storage:
  auth_uploads:
  approval_uploads:
  ocr_uploads:
  expense_uploads:
  ocr_models:
  web_node_modules:
  ollama_data:

networks:
  erp-network:
    driver: bridge
