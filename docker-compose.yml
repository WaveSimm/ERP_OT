version: "3.9"

services:
  # ─── Databases ─────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: erp-ot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_ot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - erp-network

  redis:
    image: redis:7-alpine
    container_name: erp-ot-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - erp-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: erp-ot-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-erp_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-erp_password}
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - erp-network

  # ─── Backend Services ───────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: erp-ot-auth
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_min32chars_change}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@erp-ot.local}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-Admin1234!}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:-erp_password}@rabbitmq:5672
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_TIMEOUT_MS: "30000"
      SEARCH_EMBED_WEIGHT: "0.6"
      SEARCH_KEYWORD_WEIGHT: "0.4"
      SEARCH_MIN_SCORE: "0.35"
      SEARCH_TITLE_EXACT_BONUS: "0.30"
      SEARCH_CONTENT_EXACT_BONUS: "0.15"
      SEARCH_TITLE_TRGM_WEIGHT: "0.20"
      SEARCH_CONTENT_TRGM_WEIGHT: "0.10"
      SEARCH_KEYWORD_MATCH_BONUS: "0.20"
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - erp-network

  user-service:
    build:
      context: .
      dockerfile: services/user/Dockerfile
    container_name: erp-ot-user
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASS:-erp_password}@rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:3001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change_me_in_production}
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - erp-network

  project-service:
    build:
      context: .
      dockerfile: services/project/Dockerfile
    container_name: erp-ot-project
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-erp_user}:${RABBITMQ_PASSWORD:-erp_password}@rabbitmq:5672
      OLLAMA_URL: http://ollama:11434
      EMBEDDING_MODEL: bge-m3
      EMBEDDING_TIMEOUT_MS: "30000"
      SEARCH_EMBED_WEIGHT: "0.6"
      SEARCH_KEYWORD_WEIGHT: "0.4"
      SEARCH_MIN_SCORE: "0.35"
      SEARCH_CONTENT_EXACT_BONUS: "0.15"
      SEARCH_CONTENT_TRGM_WEIGHT: "0.10"
      SEARCH_KEYWORD_MATCH_BONUS: "0.20"
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - auth-service
      - user-service
    networks:
      - erp-network
    volumes:
      - file_storage:/app/storage

  attendance-service:
    build:
      context: .
      dockerfile: services/attendance/Dockerfile
    container_name: erp-ot-attendance
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3004
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      AUTH_SERVICE_URL: http://auth-service:3001
      USER_SERVICE_URL: http://user-service:3002
      PROJECT_SERVICE_URL: http://project-service:3003
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-change_me_in_production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - redis
      - auth-service
    networks:
      - erp-network

  equipment-service:
    build:
      context: .
      dockerfile: services/equipment/Dockerfile
    container_name: erp-ot-equipment
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3005
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      AUTH_SERVICE_URL: http://auth-service:3001
      PROJECT_SERVICE_URL: http://project-service:3003
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_min32chars_change}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3005:3005"
    depends_on:
      - postgres
      - auth-service
    networks:
      - erp-network

  approval-service:
    build:
      context: .
      dockerfile: services/approval/Dockerfile
    container_name: erp-ot-approval
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3006
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      AUTH_SERVICE_URL: http://auth-service:3001
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      ATTENDANCE_SERVICE_URL: http://attendance-service:3004
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_min32chars_change}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "3006:3006"
    volumes:
      - approval_uploads:/app/uploads
    depends_on:
      - postgres
      - auth-service
      - attendance-service
    networks:
      - erp-network

  # ─── OCR Service ──────────────────────────────────────────────────────────────
  ocr-engine:
    build:
      context: ./services/ocr/engine
      dockerfile: Dockerfile
    container_name: erp-ot-ocr-engine
    restart: unless-stopped
    environment:
      USE_GPU: "false"
      LANG: korean
      MODEL_DIR: /app/models
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLOVA_OCR_API_URL: ${CLOVA_OCR_API_URL:-}
      CLOVA_OCR_SECRET_KEY: ${CLOVA_OCR_SECRET_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ocr_models:/app/models
    # 메모리 제한: PaddleOCR/EasyOCR 다국어 모델 lazy-load 누적 방지 (개발 PC 메모리 15GB 압박 완화)
    mem_limit: 4g
    mem_reservation: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - erp-network

  # OCR 개발용 테스트 UI (정적 HTML) — localhost:9090
  ocr-test-ui:
    image: nginx:alpine
    container_name: erp-ot-ocr-test-ui
    restart: unless-stopped
    volumes:
      - ./services/ocr/test-ui:/usr/share/nginx/html:ro
    ports:
      - "9090:80"
    networks:
      - erp-network

  ocr-service:
    build:
      context: .
      dockerfile: services/ocr/Dockerfile
    container_name: erp-ot-ocr
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3007
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD:-erp_password}@postgres:5432/${POSTGRES_DB:-erp_ot}?schema=ocr
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      OCR_ENGINE_URL: http://ocr-engine:8000
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      AUTH_SERVICE_URL: http://auth-service:3001
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-dev_internal_token_min32chars_change}
      CORS_ORIGIN: "*"
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
    ports:
      - "3007:3007"
    volumes:
      - ocr_uploads:/app/uploads
    depends_on:
      ocr-engine:
        condition: service_healthy
      postgres:
        condition: service_started
      auth-service:
        condition: service_started
    networks:
      - erp-network

  # ─── DB Backup (매일 02:00 자동 백업) ────────────────────────────────────────
  db-backup:
    image: postgres:16-alpine
    container_name: erp-ot-backup
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "DB + Files backup service started. Schedule: daily 02:00"
        while true; do
          NEXT=$(date -d "tomorrow 02:00" +%s 2>/dev/null || date -d "02:00" +%s)
          NOW=$(date +%s)
          SLEEP=$((NEXT - NOW))
          if [ $$SLEEP -le 0 ]; then SLEEP=86400; fi
          echo "Next backup in $$SLEEP seconds"
          sleep $$SLEEP
          TIMESTAMP=$$(date +%Y%m%d_%H%M%S)
          FILE="/backups/erp_ot_$${TIMESTAMP}.sql.gz"
          echo "[$${TIMESTAMP}] Starting DB backup..."
          PGPASSWORD=$${POSTGRES_PASSWORD} pg_dump -h postgres -U $${POSTGRES_USER} -d $${POSTGRES_DB} --no-owner --no-privileges | gzip > "$$FILE"
          if [ $$? -eq 0 ]; then
            SIZE=$$(du -h "$$FILE" | cut -f1)
            echo "[$${TIMESTAMP}] DB Backup OK: $$FILE ($$SIZE)"
          else
            echo "[$${TIMESTAMP}] DB Backup FAILED"
            rm -f "$$FILE"
          fi
          echo "[$${TIMESTAMP}] Starting uploads backup..."
          UFILE="/backups/uploads_$${TIMESTAMP}.tar.gz"
          tar czf "$$UFILE" -C /uploads . 2>/dev/null
          if [ $$? -eq 0 ]; then
            USIZE=$$(du -h "$$UFILE" | cut -f1)
            echo "[$${TIMESTAMP}] Uploads Backup OK: $$UFILE ($$USIZE)"
          else
            echo "[$${TIMESTAMP}] Uploads Backup skipped (empty or failed)"
            rm -f "$$UFILE"
          fi
          find /backups -name "erp_ot_*.sql.gz" -mtime +30 -delete 2>/dev/null || true
          find /backups -name "uploads_*.tar.gz" -mtime +30 -delete 2>/dev/null || true
        done
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-erp_password}
      POSTGRES_DB: ${POSTGRES_DB:-erp_ot}
    volumes:
      - ./backups:/backups
      - approval_uploads:/uploads:ro
    depends_on:
      - postgres
    networks:
      - erp-network

  # ─── Frontend Apps ──────────────────────────────────────────────────────────
  web:
    image: node:20-alpine
    container_name: erp-ot-web
    restart: unless-stopped
    working_dir: /app
    command: sh -c "rm -rf .next && npm install && npm run dev"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      API_BASE_URL: http://project-service:3003
      AUTH_SERVICE_URL: http://auth-service:3001
      ATTENDANCE_SERVICE_URL: http://attendance-service:3004
      EQUIPMENT_SERVICE_URL: http://equipment-service:3005
      APPROVAL_SERVICE_URL: http://approval-service:3006
      OCR_SERVICE_URL: http://ocr-service:3007
      JWT_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - project-service
      - auth-service
    networks:
      - erp-network

  # ─── Ollama (자연어 검색용 임베딩 모델) ──────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: erp-ot-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_KEEP_ALIVE: "30m"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - erp-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  file_storage:
  approval_uploads:
  ocr_uploads:
  ocr_models:
  web_node_modules:
  ollama_data:

networks:
  erp-network:
    driver: bridge
