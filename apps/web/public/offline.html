<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오프라인 · ERP-OT</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
      font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif; background:#f9fafb; color:#374151; }
    .box { text-align:center; padding:2rem; }
    .box h1 { font-size:1.1rem; margin:0 0 .5rem; color:#111827; }
    .box p { font-size:.85rem; color:#6b7280; margin:0; }
    button { margin-top:1.25rem; padding:.5rem 1rem; font-size:.85rem; border:1px solid #d1d5db;
      background:#fff; border-radius:.5rem; cursor:pointer; }
  </style>
</head>
<body>
  <div class="box">
    <h1>오프라인 상태입니다</h1>
    <p>인터넷 연결을 확인한 뒤 다시 시도해 주세요.</p>
    <button onclick="location.reload()">다시 시도</button>
  </div>
</body>
</html>
