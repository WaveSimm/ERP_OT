name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # version 미지정: package.json "packageManager": "pnpm@9.0.0" 를 따름 (둘 다 지정 시 ERR_PNPM_BAD_PM_VERSION)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint: 루트 flat config(eslint.config.js)로 모노레포 전체. 도입 베이스라인 = 부채 룰(no-explicit-any 등)은
      #   off/warn, 신규 위반만 점진 강화(ratchet). prisma generate 불필요(타입미인지).
      - name: Lint
        run: pnpm lint

      # 타입체크(서비스별 순차 generate→build). 이 monorepo는 7개 서비스가 각자 schema.prisma를 갖지만
      #   generator output 미지정이라 전부 공유 @prisma/client 한 곳에 생성 → 병렬 generate가 서로 덮어씀(clobber).
      #   그래서 서비스마다 "자기 client 생성 → 즉시 build" 를 순차로 수행해 덮어쓰기 전에 타입체크를 끝낸다.
      #   (Docker 빌드는 서비스별 격리라 운영은 정상. per-schema output 정식화는 Phase 2.)
      # 제외: user-service(schema 없는 스텁 → generate 제외, build만), web(타입정합성 Phase 1).
      #   (고아 @erp-ot/ui·api-client 삭제 완료, eslint 도입 완료)
      - name: Type check (per-service generate then build)
        run: |
          set -e
          for s in auth approval attendance equipment expense ocr project; do
            echo "::group::typecheck @erp-ot/${s}-service"
            pnpm --filter "@erp-ot/${s}-service" run db:generate
            pnpm exec turbo run build --filter="@erp-ot/${s}-service"
            echo "::endgroup::"
          done
          echo "::group::typecheck user-service (no prisma)"
          pnpm exec turbo run build --filter=@erp-ot/user-service
          echo "::endgroup::"

      # web 타입체크(Phase 2 재편입): lib/api.ts 도메인 분할 + any 점진 타이핑으로 정합성 확보 후
      #   CI 게이트에 재추가(베이스라인 에러 0). next build 대신 tsc --noEmit(빠름·prisma 불필요).
      #   이후 web 타입회귀는 여기서 차단된다.
      - name: Type check (web)
        run: pnpm --filter @erp-ot/web run typecheck

      # 테스트 0개 동안 vitest("No test files" exit 1) 폴백 — Phase 0 ⑤에서 실제 테스트 도입 시 자동으로 진짜 게이트화.
      #   turbo 의 -- 뒤 인자는 각 task(vitest run)로 전달됨(pnpm test -- 는 turbo 플래그로 오해돼 실패).
      - name: Test
        run: pnpm exec turbo run test -- --passWithNoTests

  # docker-build 잡 보류: auth/user Dockerfile이 erp-ot-build-base:latest(=docker-compose 정의)에 의존하는데
  #   CI 러너엔 그 base 이미지가 없어 항상 실패. 재도입하려면 base 이미지 선빌드 스텝(build-base/runtime-base)을
  #   먼저 추가해야 함. 그때까진 lint + 타입체크(pnpm build) 게이트로 운영.
