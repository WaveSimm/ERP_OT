name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # version 미지정: package.json "packageManager": "pnpm@9.0.0" 를 따름 (둘 다 지정 시 ERR_PNPM_BAD_PM_VERSION)
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint 보류: eslint 가 monorepo 어디에도 설치돼 있지 않아(전 패키지 lint="eslint src/"인데 eslint 의존 0)
      #   turbo run lint 는 "eslint: not found"로 전부 실패. eslint+config+plugin 도입은 Phase 1 별도 작업 → 그때 재추가.
      # 고아 패키지 @erp-ot/ui·@erp-ot/api-client 제외: 둘 다 import 0(dead stub)인데 build="tsc"에 tsconfig가 없어 실패.
      #   Phase 1에서 정식 삭제 예정. 그때까진 live 코드만 타입체크(이게 리팩토링 회귀 게이트의 핵심).
      - name: Type check
        run: pnpm exec turbo run build --filter=!@erp-ot/ui --filter=!@erp-ot/api-client

      # 테스트 0개 동안 vitest("No test files" exit 1) 폴백 — Phase 0 ⑤에서 실제 테스트 도입 시 자동으로 진짜 게이트화
      - name: Test
        run: pnpm test -- --passWithNoTests

  # docker-build 잡 보류: auth/user Dockerfile이 erp-ot-build-base:latest(=docker-compose 정의)에 의존하는데
  #   CI 러너엔 그 base 이미지가 없어 항상 실패. 재도입하려면 base 이미지 선빌드 스텝(build-base/runtime-base)을
  #   먼저 추가해야 함. 그때까진 lint + 타입체크(pnpm build) 게이트로 운영.
